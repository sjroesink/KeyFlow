<body class="bg-background text-on-surface font-body min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation Bar (Shared Component Style) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-16 bg-[#0b1326]">

<div class="flex flex-col">
<h1 class="font-headline font-bold text-lg text-on-surface leading-tight">Clair de Lune — Claude Debussy</h1>
<div class="flex items-center gap-2">
<div class="w-48 h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="w-[42%] h-full bg-primary-container"></div>
</div>
<span class="text-[10px] font-label uppercase tracking-widest text-outline">42% Completed</span>
</div>
</div>
</div>
<nav class="hidden md:flex items-center gap-6 font-manrope text-sm font-medium tracking-wide">
<a class="text-[#8e90a2] hover:text-[#dae2fd] transition-colors" href="#">Library</a>
<a class="text-[#b5c4ff] border-b-2 border-[#b5c4ff] pb-1" href="#">Practice</a>
<a class="text-[#8e90a2] hover:text-[#dae2fd] transition-colors" href="#">Courses</a>
</nav>
<div class="flex items-center gap-4">
<button class="p-2 text-[#8e90a2] hover:bg-[#2d3449] rounded-lg transition-all">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="w-8 h-8 rounded-full bg-surface-container-highest border border-outline-variant/15 flex items-center justify-center overflow-hidden">

</div>
</div>
</header>
<!-- Main Workspace -->
<main class="flex-1 mt-16 flex flex-col items-center justify-center relative px-6 pb-48">
<!-- Sheet Music Canvas -->
<div class="w-full max-w-5xl aspect-[16/7] bg-surface-container-low rounded-xl relative overflow-hidden flex items-center justify-center group">
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-surface/40 pointer-events-none"></div>
<!-- Sheet Music Placeholder Representation -->
<div class="w-full h-full p-12 flex flex-col justify-around">
<!-- Music Stave 1 -->
<div class="relative w-full h-24 border-y border-outline-variant/20 flex items-center">
<div class="absolute left-0 h-full border-l-4 border-on-surface-variant/30 flex flex-col justify-center px-4">
<span class="material-symbols-outlined text-4xl text-on-surface-variant">gleaf</span>
</div>
<!-- Note Progress Marker (Active Wait Mode) -->
<div class="absolute left-1/3 w-1 h-32 bg-secondary/80 z-20 shadow-[0_0_15px_rgba(233,195,73,0.5)]"></div>
<!-- Notes Mockup -->
<div class="flex gap-16 ml-32 items-center">
<div class="flex flex-col items-center gap-1 opacity-40">
<div class="w-4 h-3 bg-tertiary rounded-full rotate-[-20deg] shadow-[0_0_12px_#66dd8b]"></div>
<div class="w-[1px] h-10 bg-on-surface"></div>
</div>
<div class="flex flex-col items-center gap-1">
<div class="w-4 h-3 bg-secondary rounded-full rotate-[-20deg] shadow-[0_0_12px_#e9c349]"></div>
<div class="w-[1px] h-10 bg-on-surface"></div>
</div>
<div class="flex flex-col items-center gap-1 opacity-20">
<div class="w-4 h-3 bg-on-surface rounded-full rotate-[-20deg]"></div>
<div class="w-[1px] h-10 bg-on-surface"></div>
</div>
</div>
</div>
<!-- Music Stave 2 -->
<div class="relative w-full h-24 border-y border-outline-variant/20 flex items-center">
<div class="absolute left-0 h-full border-l-4 border-on-surface-variant/30 flex flex-col justify-center px-4">
<span class="material-symbols-outlined text-4xl text-on-surface-variant">music_note</span>
</div>
<div class="flex gap-12 ml-40 items-center">
<div class="flex flex-col items-center gap-1">
<div class="w-4 h-3 bg-error rounded-full rotate-[-20deg]"></div>
<div class="w-[1px] h-10 bg-on-surface"></div>
</div>
</div>
</div>
</div>
<!-- Floating Overlay Notification -->
<div class="absolute top-8 left-1/2 -translate-x-1/2 glass-panel px-6 py-3 rounded-full border border-outline-variant/15 flex items-center gap-3">
<span class="material-symbols-outlined text-secondary animate-pulse">pause_circle</span>
<span class="text-sm font-medium tracking-wide text-on-surface-variant">Waiting for <span class="text-secondary font-bold">Ab4</span></span>
</div>
</div>
<!-- Floating Controls (Glassmorphism) -->
<div class="absolute bottom-52 flex items-center gap-4">
<!-- Tempo Control -->
<div class="glass-panel px-6 py-4 rounded-2xl flex flex-col gap-2 min-w-[200px]">
<div class="flex justify-between items-center">
<span class="text-[10px] uppercase tracking-widest text-outline">Tempo</span>
<span class="text-sm font-bold text-secondary">85%</span>
</div>
<input class="w-full h-1.5 bg-surface-container-highest rounded-full appearance-none cursor-pointer accent-secondary" type="range"/>
</div>
<!-- Loop Selection -->
<button class="glass-panel h-16 px-6 rounded-2xl flex items-center gap-3 hover:bg-surface-bright transition-all group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">repeat</span>
<span class="text-sm font-medium">Loop Bars 12-16</span>
</button>
<!-- Wait Mode Toggle -->
<div class="glass-panel h-16 pl-6 pr-2 rounded-2xl flex items-center gap-6 border border-secondary/20">
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-widest text-secondary font-bold">Wait Mode</span>
<span class="text-xs text-on-surface-variant">Pauses for you</span>
</div>
<div class="w-12 h-6 bg-secondary rounded-full flex items-center justify-end px-1">
<div class="w-4 h-4 bg-on-secondary rounded-full"></div>
</div>
</div>
</div>
</main>
<!-- Virtual Keyboard & Controls Bottom Shell -->

<div class="w-full h-1.5 bg-surface-container-highest">
<div class="h-full bg-primary shadow-[0_0_15px_rgba(181,196,255,0.4)] w-[42%]"></div>
</div>
<div class="bg-surface-container-low px-8 py-4 flex items-end justify-center relative">

<div class="piano-key-black bg-surface-container-lowest"></div>

<div class="piano-key-black bg-surface-container-lowest"></div>
<div class="piano-key-white bg-on-surface-variant/10 border-r border-background/50 hover:bg-surface-bright transition-colors"></div>
<div class="piano-key-black bg-surface-container-lowest"></div>
<div class="piano-key-white bg-on-surface-variant/10 border-r border-background/50 hover:bg-surface-bright transition-colors"></div>
</div>
<!-- Octave Active (Correct Note Green) -->
<div class="flex">
<div class="piano-key-white bg-tertiary shadow-[inset_0_-10px_20px_rgba(0,0,0,0.2)] border-r border-background/50"></div>
<div class="piano-key-black bg-surface-container-lowest"></div>
<div class="piano-key-white bg-on-surface-variant/10 border-r border-background/50"></div>
<div class="piano-key-black bg-surface-container-lowest"></div>

<div class="piano-key-white bg-secondary/90 shadow-[inset_0_-10px_20px_rgba(0,0,0,0.2)] border-r border-background/50 relative overflow-hidden">
<div class="absolute bottom-4 left-1/2 -translate-x-1/2 text-[10px] font-bold text-on-secondary-container">Ab4</div>
</div>
<div class="piano-key-white bg-on-surface-variant/10 border-r border-background/50"></div>

<div class="piano-key-black bg-error shadow-[inset_0_-5px_10px_rgba(0,0,0,0.4)]"></div>

<div class="piano-key-white bg-on-surface-variant/10 border-r border-background/50"></div>
</div>
</div>

<div class="absolute right-12 bottom-8 flex flex-col gap-4">
<button class="w-14 h-14 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-lg hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-3xl">timer</span>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-highest text-on-surface flex items-center justify-center shadow-lg hover:scale-105 transition-transform border border-outline-variant/20">
<span class="material-symbols-outlined text-3xl">settings_input_component</span>
</button>
</div>
</div>
</footer>

<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-20 px-4 pb-safe md:hidden bg-[#2d3449]/60 backdrop-blur-xl rounded-t-2xl shadow-[0_-10px_30px_rgba(6,14,32,0.5)]">
<div class="flex flex-col items-center justify-center text-[#8e90a2]">
<span class="material-symbols-outlined">explore</span>
<span class="font-inter text-[10px] uppercase tracking-widest mt-1">Explore</span>
</div>
<div class="flex flex-col items-center justify-center text-[#e9c349] scale-110">
<span class="material-symbols-outlined">piano</span>

</div>
<div class="flex flex-col items-center justify-center text-[#8e90a2]">
<span class="material-symbols-outlined">music_note</span>

<div class="flex flex-col items-center justify-center text-[#8e90a2]">
